services:
  # 1. FastAPI API server service
  api:
    build:
      context: . # Use the Dockerfile in the project root
    container_name: ngpsuite-api
    expose
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 3m
      timeout: 10s
      retries: 3
      start_period: 90s

